<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Relevance System</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Expert Relevance System</h1>

        <form id="matchForm">

            <h2>Candidate Details</h2>

            <label for="candidateName">Candidate Name</label>
            <input type="text" id="candidateName" placeholder="Enter your name">

            <label for="candidateSubject">Candidate Subject</label>
            <select id="candidateSubject">
                <option value="">Select Subject</option>
                <option value="Python">Python</option>
                <option value="Java">Java</option>
                <option value="Web Development">Web Development</option>
                <option value="Data Science">Data Science</option>
                <option value="Machine Learning">Machine Learning</option>
            </select>

            <label for="candidateSkill">Area of Expertise</label>
            <select id="candidateSkill">
                <option value="">Select Skill</option>
                <option value="Python">Python</option>
                <option value="HTML CSS">HTML & CSS</option>
                <option value="JavaScript">JavaScript</option>
                <option value="Java">Java</option>
                <option value="Machine Learning">Machine Learning</option>
            </select>

            <h2>Interview Board Subject</h2>

            <label for="expertSubject">Expert Subject</label>
            <select id="expertSubject">
                <option value="">Select Subject</option>
                <option value="Python">Python</option>
                <option value="Java">Java</option>
                <option value="Web Development">Web Development</option>
                <option value="Data Science">Data Science</option>
                <option value="Machine Learning">Machine Learning</option>
            </select>

            <br><br>

            <button type="button" onclick="findMatch()">
                Find Best Expert
            </button>

        </form>

        <div id="result">
            <h2>Result</h2>
            <p id="output">No result yet.</p>
        </div>
    </div>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>
</html>
